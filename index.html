.product-title{

}

.price{

    color:green;
    padding:5px;
    border-radius:20px;
    display:inline-block;
    margin-bottom:8px;
    font-weight:bold;
}

.btn{
    background:#ffcc00;
    padding:10px;
    border:none;
    border-radius:10px;
    width:100%;
    font-weight:bold;
    cursor:pointer;
}
</style>
